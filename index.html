<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidayah - Fresh Finds, Best Prices</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#f8f9fa;
}

/* Hero */
.hero{
    height:100vh;
    background:url('https://i.ibb.co/2Y0wPTyp/pexels-jimmy-liao-3615017-19242076.jpg') center/cover;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero::before{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.55);
}

.hero-content{
    position:relative;
    color:#fff;
    padding:20px;
}

.hero h1{
    font-size:3rem;
    margin-bottom:10px;
}

.hero p{
    font-size:1.2rem;
    margin-bottom:25px;
}

.btn{
    background:#25D366;
    color:white;
    border:none;
    padding:14px 28px;
    border-radius:50px;
    cursor:pointer;
    font-size:16px;
}

/* Products */
.section-title{
    text-align:center;
    padding:40px 0 20px;
    font-size:32px;
}

.products{
    display:flex;
    overflow-x:auto;
    gap:20px;
    padding:20px;
    scroll-snap-type:x mandatory;
}

.products::-webkit-scrollbar{
    display:none;
}

.card{
    min-width:280px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
    scroll-snap-align:center;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-body{
    padding:20px;
}

.card h3{
    margin-bottom:10px;
}

.price{
    color:#25D366;
    font-size:22px;
    font-weight:700;
    margin-bottom:15px;
}

.add-btn{
    width:100%;
    background:black;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
}

/* Cart */
.cart-icon{
    position:fixed;
    top:20px;
    right:20px;
    background:#25D366;
    color:white;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    cursor:pointer;
    z-index:1000;
}

.cart-count{
    position:absolute;
    top:-5px;
    right:-5px;
    background:red;
    color:white;
    width:25px;
    height:25px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.cart{
    position:fixed;
    right:-400px;
    top:0;
    width:350px;
    height:100%;
    background:white;
    box-shadow:-5px 0 20px rgba(0,0,0,.2);
    transition:.3s;
    padding:20px;
    overflow:auto;
    z-index:999;
}

.cart.active{
    right:0;
}

.cart-item{
    padding:10px 0;
    border-bottom:1px solid #ddd;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:10px;
}

.send-btn{
    width:100%;
    background:#25D366;
    color:white;
    border:none;
    padding:14px;
    border-radius:10px;
    cursor:pointer;
}

/* WhatsApp */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:28px;
    text-decoration:none;
}

footer{
    text-align:center;
    padding:40px 20px;
    background:#111;
    color:white;
    margin-top:50px;
}

@media(max-width:768px){
    .hero h1{
        font-size:2.2rem;
    }

    .cart{
        width:100%;
    }
}
</style>
</head>
<body>

<!-- CART -->
<div class="cart-icon" onclick="toggleCart()">
🛒
<div class="cart-count" id="count">0</div>
</div>

<div class="cart" id="cart">
<h2>Your Order</h2>

<div id="cartItems"></div>

<h3>Customer Details</h3>

<input type="text" id="customerName" placeholder="Your Name">
<input type="tel" id="customerPhone" placeholder="Phone Number">

<button class="send-btn" onclick="sendOrder()">
Send Order
</button>
</div>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>Hidayah</h1>
<p>Fresh Finds, Best Prices</p>
<button class="btn"
onclick="document.getElementById('products').scrollIntoView()">
Shop Now
</button>
</div>
</section>

<!-- PRODUCTS -->
<h2 class="section-title" id="products">
Our Products
</h2>

<div class="products">

<div class="card">
<img src="https://i.ibb.co/HTMcDRWB/Screenshot-2026-05-10-013152.png">
<div class="card-body">
<h3>Premium Product</h3>
<div class="price">₹299</div>
<button class="add-btn"
onclick="addToCart('Premium Product','₹299')">
Add to Cart
</button>
</div>
</div>

<div class="card">
<img src="https://i.ibb.co/HTMcDRWB/Screenshot-2026-05-10-013152.png">
<div class="card-body">
<h3>Special Offer</h3>
<div class="price">₹499</div>
<button class="add-btn"
onclick="addToCart('Special Offer','₹499')">
Add to Cart
</button>
</div>
</div>

<div class="card">
<img src="https://i.ibb.co/HTMcDRWB/Screenshot-2026-05-10-013152.png">
<div class="card-body">
<h3>Best Seller</h3>
<div class="price">₹799</div>
<button class="add-btn"
onclick="addToCart('Best Seller','₹799')">
Add to Cart
</button>
</div>
</div>

</div>

<footer>
<h3>Hidayah</h3>
<p>Fresh Finds, Best Prices</p>
<p>Contact: arshuu6283@gmail.com</p>
</footer>

<!-- WhatsApp -->
<a class="whatsapp"
href="https://wa.me/6283548549"
target="_blank">
💬
</a>

<script>
emailjs.init({
    publicKey:"YOUR_PUBLIC_KEY"
});

let cart=[];

function toggleCart(){
    document.getElementById('cart')
    .classList.toggle('active');
}

function addToCart(name,price){
    cart.push({name,price});
    updateCart();
}

function updateCart(){
    document.getElementById('count')
    .innerText=cart.length;

    let html='';

    cart.forEach(item=>{
        html+=`
        <div class="cart-item">
        ${item.name}<br>
        <b>${item.price}</b>
        </div>
        `;
    });

    document.getElementById('cartItems').innerHTML=html;
}

function sendOrder(){

    const customer=
    document.getElementById('customerName').value;

    const phone=
    document.getElementById('customerPhone').value;

    if(!customer||!phone||cart.length===0){
        alert('Fill details and add products');
        return;
    }

    const order=cart
    .map(x=>`${x.name} - ${x.price}`)
    .join('\n');

    emailjs.send(
        'YOUR_SERVICE_ID',
        'YOUR_TEMPLATE_ID',
        {
            customer_name:customer,
            customer_phone:phone,
            order_details:order,
            owner_email:'arshuu6283@gmail.com'
        }
    ).then(()=>{
        alert('Order Sent Successfully!');
        cart=[];
        updateCart();
    }).catch(()=>{
        alert('Email sending failed');
    });
}

/* Auto-scroll products */
const slider=document.querySelector('.products');

setInterval(()=>{
    slider.scrollBy({
        left:300,
        behavior:'smooth'
    });

    if(
      slider.scrollLeft+
      slider.clientWidth>=
      slider.scrollWidth-10
    ){
        slider.scrollTo({
            left:0,
            behavior:'smooth'
        });
    }
},3000);
</script>

</body>
</html>
